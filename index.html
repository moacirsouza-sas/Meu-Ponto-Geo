
<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ponto Inteligente OCR + GPS</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

:root{
--primary:#2563eb;
--bg:#f1f5f9;
--text:#1e293b;
--extra:#16a34a;
--falta:#dc2626;
}

body{
font-family:Segoe UI;
background:var(--bg);
padding:15px;
display:flex;
flex-direction:column;
align-items:center;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 15px rgba(0,0,0,0.1);
width:100%;
max-width:450px;
margin-bottom:20px;
}

.grid-inputs{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:15px;
}

input{
padding:12px;
border:1px solid #cbd5e1;
border-radius:8px;
text-align:center;
font-weight:bold;
}

button{
cursor:pointer;
padding:14px;
border-radius:8px;
border:none;
font-weight:bold;
width:100%;
}

.btn-main{
background:var(--primary);
color:white;
}

.btn-save{
background:var(--text);
color:white;
margin-top:15px;
}

.status-box{
margin-top:10px;
font-size:0.85rem;
padding:10px;
border-radius:8px;
background:#f8fafc;
border:1px solid #e2e8f0;
}

#preview{
max-width:100%;
border-radius:10px;
margin-top:15px;
display:none;
border:1px solid #ddd;
}

.history-grid{
width:100%;
max-width:450px;
display:flex;
flex-direction:column;
gap:10px;
}

.day-card{
background:white;
padding:15px;
border-radius:10px;
border-left:6px solid var(--primary);
display:flex;
justify-content:space-between;
align-items:center;
}

.extra{color:var(--extra);font-weight:bold}
.falta{color:var(--falta);font-weight:bold}

.map-link{
color:var(--primary);
font-size:0.8rem;
font-weight:bold;
text-decoration:none;
}

</style>

</head>


<body>



<div class="card">

<h2 style="text-align:center">
⏱️ Ponto OCR + GPS
</h2>

<button class="btn-main"
onclick="fotoInput.click()">

📸 Tirar Foto

</button>

<input
type="file"
id="fotoInput"
accept="image/*"
capture="environment"
style="display:none"
onchange="processarPonto(this)"
>



<div class="status-box">

<div id="ocrStatus">
⚪ Aguardando foto
</div>

<div id="gpsStatus">
⚪ Verificando GPS
</div>

</div>



<div class="grid-inputs">

<div>
Entrada
<input type="time" id="entrada">
</div>

<div>
Saída
<input type="time" id="saida">
</div>

</div>



<img id="preview">

<button onclick="arquivarDia()" class="btn-save">
💾 Arquivar Registro
</button>

</div>



<div id="historico" class="history-grid"></div>



<script>



let base64Image="";
let latLog="";
let dataOCR="";



/* GPS */

function capturarGPS(){

navigator.geolocation.getCurrentPosition(

p=>{

latLog=`${p.coords.latitude},${p.coords.longitude}`;

gpsStatus.innerText="📍 GPS capturado";

},

()=>{

gpsStatus.innerText="❌ GPS bloqueado";

});

}

capturarGPS();



/* DATA OCR */

function extrairDataOCR(texto){

const r=/([0-3]?\d)[\/\-.]([01]?\d)[\/\-.](20\d{2})/;

const m=texto.match(r);

if(m){

let d=m[1].padStart(2,'0');
let mo=m[2].padStart(2,'0');
let a=m[3];

return `${d}/${mo}/${a}`;

}

return "";

}



/* CALCULO */

function calcularHoras(ent,sai){

let [h1,m1]=ent.split(":");
let [h2,m2]=sai.split(":");

let t1=(h1*60)+(m1*1);
let t2=(h2*60)+(m2*1);

let total=t2-t1;

let h=Math.floor(total/60);
let m=total%60;

return `${h}h${m.toString().padStart(2,'0')}`;

}



function calcularExtra(ent,sai){

let [h1,m1]=ent.split(":");
let [h2,m2]=sai.split(":");

let t1=(h1*60)+(m1*1);
let t2=(h2*60)+(m2*1);

let total=t2-t1;

let extra=total-480;

let tipo=extra>=0?"extra":"falta";

extra=Math.abs(extra);

let h=Math.floor(extra/60);
let m=extra%60;

return{

texto:`${h}h${m.toString().padStart(2,'0')}`,
tipo:tipo

};

}



/* RASCUNHO AUTO */

function salvarRascunho(){

const hoje=new Date().toLocaleDateString('pt-BR');

const r={

dataHoje:hoje,

entrada:entrada.value,

saida:saida.value,

foto:base64Image,

gps:latLog,

dataOCR:dataOCR

};

localStorage.setItem(
'ponto_rascunho',
JSON.stringify(r)
);

}



function carregarRascunho(){

const r=
JSON.parse(
localStorage.getItem('ponto_rascunho')||'{}'
);

if(!r.dataHoje) return;

const hoje=
new Date().toLocaleDateString('pt-BR');


if(r.dataHoje!==hoje){

localStorage.removeItem('ponto_rascunho');
return;

}


if(r.entrada) entrada.value=r.entrada;

if(r.saida) saida.value=r.saida;

if(r.foto){

base64Image=r.foto;

preview.src=r.foto;

preview.style.display="block";

}

if(r.gps){

latLog=r.gps;

gpsStatus.innerText="📍 GPS restaurado";

}

if(r.dataOCR){

dataOCR=r.dataOCR;

}

}



/* OCR */

async function processarPonto(input){

const file=input.files[0];
if(!file)return;

const reader=new FileReader();

reader.readAsDataURL(file);

reader.onload=async(e)=>{

base64Image=e.target.result;

preview.src=base64Image;
preview.style.display="block";

ocrStatus.innerText="🔍 Lendo imagem";

try{

const {data:{text}}=
await Tesseract.recognize(file,'eng');

dataOCR=extrairDataOCR(text);

const match=
text.match(/([01]?[0-9]|2[0-3])[:h][0-5][0-9]/);

if(match){

let hora=match[0].replace('h',':');

if(!entrada.value)
entrada.value=hora;
else
saida.value=hora;

}

ocrStatus.innerText=
`OK ${dataOCR||"Hoje"}`;

}catch{

ocrStatus.innerText="Erro OCR";

}

capturarGPS();

salvarRascunho();

};

}



/* SALVAR */

function arquivarDia(){

const ent=entrada.value;
const sai=saida.value;

if(!ent||!sai)
return alert("Preencha Entrada e Saída");


const dataFinal=
dataOCR||
new Date().toLocaleDateString('pt-BR');


const horas=
calcularHoras(ent,sai);

const extra=
calcularExtra(ent,sai);



const registro={

data:dataFinal,

entrada:ent,

saida:sai,

gps:latLog,

foto:base64Image,

horas:horas,

extra:extra.texto,

tipo:extra.tipo

};



let banco=
JSON.parse(
localStorage.getItem('ponto_db')||'[]'
);


banco.push(registro);


localStorage.setItem(
'ponto_db',
JSON.stringify(banco)
);


localStorage.removeItem(
'ponto_rascunho'
);


location.reload();

}



/* HISTORICO */

function carregarHistorico(){

const banco=
JSON.parse(
localStorage.getItem('ponto_db')||'[]'
);


banco.reverse().forEach(dia=>{

const maps=
dia.gps?
`https://www.google.com/maps?q=${dia.gps}`
:"#";


historico.innerHTML+=`

<div class="day-card">

<div>

<strong>${dia.data}</strong>

<br>

${dia.entrada} ➔ ${dia.saida}

<br>

Total ${dia.horas}

<br>

<span class="${dia.tipo}">
${dia.tipo==="extra"?"Extra":"Falta"}
${dia.extra}
</span>

<br>

${dia.gps?
`<a class="map-link"
href="${maps}"
target="_blank">
Mapa
</a>`:""}

</div>

<img src="${dia.foto}"
style="width:50px;height:50px;border-radius:5px;object-fit:cover"
onclick="window.open(this.src)">

</div>

`;

});

}



entrada.addEventListener("change",salvarRascunho);
saida.addEventListener("change",salvarRascunho);



carregarRascunho();

carregarHistorico();


</script>

</body>

</html>
