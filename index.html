
<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width">

<title>Ponto Cloud Sync</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#f1f5f9;
text-align:center;
padding:10px;
}

.card{

background:white;
padding:20px;
border-radius:15px;
max-width:450px;
margin:auto;
margin-bottom:10px;

}

button{

width:100%;
padding:14px;
margin-top:8px;
border-radius:8px;
border:none;
background:#2563eb;
color:white;
font-weight:bold;

}

</style>

</head>

<body>

<div class="card">

<h3 id="horas">Horas Hoje 0</h3>
<h3 id="extra">Extra Hoje 0</h3>
<h3 id="saldo">Saldo Hoje 0</h3>
<h3 id="total">Saldo Total 0</h3>

<div id="gps">
GPS aguardando
</div>

</div>

<div class="card">

<button onclick="entrada()">Entrada</button>

<button onclick="saidaAlmoco()">Saída almoço</button>

<button onclick="voltaAlmoco()">Volta almoço</button>

<button onclick="saida()">Saída</button>

</div>

<script>

const URL_SCRIPT=
"COLE_LINK_AQUI"



let registros={}

let hoje=
new Date().toISOString().slice(0,10)

let gpsAtual=""



function salvarLocal(){

localStorage.setItem(
"pontoSync",
JSON.stringify(registros)
)

}



function carregarLocal(){

registros=
JSON.parse(
localStorage.getItem("pontoSync")||"{}"
)

}



function entrada(){

if(!registros[hoje])
registros[hoje]={}

registros[hoje].entrada=new Date()

salvarLocal()

calc()

}



function saidaAlmoco(){

registros[hoje].saidaAlmoco=new Date()

salvarLocal()

calc()

}



function voltaAlmoco(){

registros[hoje].voltaAlmoco=new Date()

salvarLocal()

calc()

}



function saida(){

registros[hoje].saida=new Date()

salvarLocal()

enviar()

calc()

}



function calcularHoje(){

let d=registros[hoje]

if(!d || !d.entrada || !d.saida)
return {h:0,e:0,s:0}


let horas=
(d.saida-d.entrada)/3600000


let intervalo=1

if(d.saidaAlmoco&&d.voltaAlmoco){

intervalo=
(d.voltaAlmoco-d.saidaAlmoco)/3600000

}


horas-=intervalo


let extra=Math.max(0,horas-8)

let saldo=horas-8


return {h:horas,e:extra,s:saldo}

}



function saldoTotal(){

let total=0

for(let d in registros){

let r=registros[d]

if(!r.entrada||!r.saida)
continue


let horas=
(r.saida-r.entrada)/3600000


let intervalo=1

if(r.saidaAlmoco&&r.voltaAlmoco){

intervalo=
(r.voltaAlmoco-r.saidaAlmoco)/3600000

}


horas-=intervalo

total+=horas-8

}


return total

}



function calc(){

let r=calcularHoje()


horas.innerHTML=
"Horas Hoje "+
r.h.toFixed(2)


extra.innerHTML=
"Extra Hoje "+
r.e.toFixed(2)


saldo.innerHTML=
"Saldo Hoje "+
r.s.toFixed(2)


total.innerHTML=
"Saldo Total "+
saldoTotal().toFixed(2)

}



function enviar(){

let r=registros[hoje]

let c=calcularHoje()


fetch(URL_SCRIPT,{

method:"POST",

body:JSON.stringify({

data:hoje,
entrada:r.entrada,
saidaAlmoco:r.saidaAlmoco,
voltaAlmoco:r.voltaAlmoco,
saida:r.saida,
horas:c.h,
extra:c.e,
saldo:c.s,
gps:gpsAtual

})

})

}



function sincronizar(){

fetch(URL_SCRIPT)

.then(r=>r.json())

.then(dados=>{

dados.forEach(l=>{

registros[l[0]]={

entrada:new Date(l[1]),
saidaAlmoco:new Date(l[2]),
voltaAlmoco:new Date(l[3]),
saida:new Date(l[4]),
gps:l[8]

}

})

salvarLocal()

calc()

})

}



function gps(){

navigator.geolocation.getCurrentPosition(

p=>{

gpsAtual=
p.coords.latitude+
","+p.coords.longitude


gps.innerHTML=
"GPS "+gpsAtual

})

}



carregarLocal()

sincronizar()

gps()

calc()

</script>

</body>

</html>
