
<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ponto Inteligente Cloud</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#f1f5f9;
padding:15px;
text-align:center;
}

.card{
background:white;
padding:20px;
border-radius:15px;
max-width:450px;
margin:auto;
box-shadow:0 10px 15px rgba(0,0,0,0.1);
}

button{
padding:14px;
width:100%;
margin-top:8px;
border:none;
border-radius:8px;
font-weight:bold;
background:#2563eb;
color:white;
}

.painel{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
max-width:450px;
margin:auto;
}

</style>

</head>

<body>

<div class="painel">

<h3 id="horas">Horas Hoje: 0</h3>

<h3 id="extra">Extra Hoje: 0</h3>

<h3 id="saldo">Saldo Hoje: 0</h3>

<h3 id="total">Saldo Total: 0</h3>

<div id="gps">
GPS aguardando
</div>

</div>

<div class="card">

<h2>Ponto Inteligente</h2>

<button onclick="entrada()">Entrada</button>

<button onclick="saidaAlmoco()">Saída Almoço</button>

<button onclick="voltaAlmoco()">Volta Almoço</button>

<button onclick="saida()">Saída</button>

<button onclick="fotoInput.click()">Foto OCR</button>

<input type="file"
id="fotoInput"
accept="image/*"
capture="environment"
style="display:none"
onchange="ocr(this)">

</div>

<script>

let registros=
JSON.parse(localStorage.getItem("ponto")||"{}")

let hoje=
new Date().toISOString().slice(0,10)

let gpsAtual=""

if(!registros[hoje])
registros[hoje]={}



function salvar(){

localStorage.setItem(
"ponto",
JSON.stringify(registros)
)

}



function entrada(){

registros[hoje].entrada=new Date()

salvar()

calcular()

}



function saidaAlmoco(){

registros[hoje].saidaAlmoco=new Date()

salvar()

calcular()

}



function voltaAlmoco(){

registros[hoje].voltaAlmoco=new Date()

salvar()

calcular()

}



function saida(){

registros[hoje].saida=new Date()

salvar()

calcular()

enviarGoogle()

}



function calcularHoje(){

let d=registros[hoje]

if(!d.entrada||!d.saida)
return {horas:0,extra:0,saldo:0}


let horas=
(d.saida-d.entrada)/3600000


let intervalo=1

if(d.saidaAlmoco && d.voltaAlmoco){

intervalo=
(d.voltaAlmoco-d.saidaAlmoco)/3600000

}


horas-=intervalo


let extra=Math.max(0,horas-8)

let saldo=horas-8


return {horas,extra,saldo}

}



function saldoTotal(){

let total=0


for(let dia in registros){

let d=registros[dia]

if(!d.entrada||!d.saida)
continue


let horas=
(d.saida-d.entrada)/3600000


let intervalo=1

if(d.saidaAlmoco && d.voltaAlmoco){

intervalo=
(d.voltaAlmoco-d.saidaAlmoco)/3600000

}


horas-=intervalo

total+=horas-8

}


return total

}



function calcular(){

let r=calcularHoje()


horas.innerHTML=
"Horas Hoje: "+r.horas.toFixed(2)


extra.innerHTML=
"Extra Hoje: "+r.extra.toFixed(2)


saldo.innerHTML=
"Saldo Hoje: "+r.saldo.toFixed(2)


total.innerHTML=
"Saldo Total: "+
saldoTotal().toFixed(2)

}



function ocr(input){

let file=input.files[0]

if(!file)return

Tesseract.recognize(file,'eng')

.then(r=>console.log(r.data.text))

}



function gps(){

navigator.geolocation.getCurrentPosition(

p=>{

gpsAtual=
p.coords.latitude+
","+p.coords.longitude


gps.innerHTML=
"GPS "+gpsAtual

registros[hoje].gps=gpsAtual

salvar()

})

}

gps()

calcular()



function enviarGoogle(){

let d=registros[hoje]

let r=calcularHoje()


fetch("COLE_LINK_SCRIPT",{

method:"POST",

body:JSON.stringify({

data:hoje,

entrada:d.entrada,

saidaAlmoco:d.saidaAlmoco,

voltaAlmoco:d.voltaAlmoco,

saida:d.saida,

horas:r.horas,

extra:r.extra,

saldo:r.saldo,

saldoTotal:saldoTotal(),

gps:gpsAtual

})

})

}

</script>

</body>

</html>
