
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ponto Inteligente</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f0f0f0;
}

.card{
background:white;
margin:15px;
padding:20px;
border-radius:12px;
box-shadow:0px 0px 10px gray;
}

button{
padding:15px;
margin:5px;
font-size:18px;
width:220px;
border-radius:8px;
border:none;
background:#2563eb;
color:white;
}

h2{
margin-top:10px;
}

.status{
font-size:12px;
color:gray;
}

.saldoPositivo{
color:green;
font-weight:bold;
}

.saldoNegativo{
color:red;
font-weight:bold;
}

</style>

</head>


<body>


<h2>Controle de Jornada</h2>



<div class="card">

<h3 id="horasTrabalhadas">
Horas Trabalhadas: 0.00
</h3>

<h3 id="horasExtras">
Horas Extras: 0.00
</h3>

<h3 id="saldoDia">
Saldo do Dia: 0.00
</h3>

<h3 id="saldoTotal">
Saldo Acumulado: 0.00
</h3>


<div id="statusBackup" class="status">
Backup ativo
</div>

</div>



<div class="card">

<button onclick="registrar('entrada')">
Entrada
</button>

<button onclick="registrar('saidaAlmoco')">
Saída Almoço
</button>

<button onclick="registrar('voltaAlmoco')">
Volta Almoço
</button>

<button onclick="registrar('saida')">
Saída
</button>

</div>



<script>



let registros={}

const jornada=8

const almocoPadrao=1



function hoje(){

return new Date().toISOString().slice(0,10)

}



function registrar(tipo){

let agora=new Date().getTime()


if(!registros[hoje()])

registros[hoje()]={}


registros[hoje()][tipo]=agora


salvar()

calcular()

}





function calcular(){

let d=registros[hoje()]


if(!d || !d.entrada){

mostrar(0,0,0)

return

}


let agora=new Date().getTime()

let fim=d.saida || agora


let trabalho=(fim-d.entrada)/3600000


let intervalo=almocoPadrao


if(d.saidaAlmoco && d.voltaAlmoco){

intervalo=(d.voltaAlmoco-d.saidaAlmoco)/3600000

}


trabalho-=intervalo


if(trabalho<0)
trabalho=0



let extra=0

if(trabalho>jornada)

extra=trabalho-jornada


let saldo=trabalho-jornada


mostrar(trabalho,extra,saldo)

}




function calcularSaldoTotal(){

let total=0


for(let dia in registros){

let d=registros[dia]


if(!d.entrada || !d.saida)

continue


let trabalho=(d.saida-d.entrada)/3600000


let intervalo=almocoPadrao


if(d.saidaAlmoco && d.voltaAlmoco){

intervalo=(d.voltaAlmoco-d.saidaAlmoco)/3600000

}


trabalho-=intervalo


let saldo=trabalho-jornada


total+=saldo

}


return total

}




function mostrar(trabalho,extra,saldo){


document.getElementById("horasTrabalhadas").innerHTML=
"Horas Trabalhadas: "+trabalho.toFixed(2)



document.getElementById("horasExtras").innerHTML=
"Horas Extras: "+extra.toFixed(2)



document.getElementById("saldoDia").innerHTML=
"Saldo do Dia: "+saldo.toFixed(2)



let total=calcularSaldoTotal()



let classe="saldoPositivo"

if(total<0)

classe="saldoNegativo"



document.getElementById("saldoTotal").innerHTML=
"Saldo Acumulado: <span class='"+classe+"'>"
+total.toFixed(2)+
"</span>"


}




function salvar(){

localStorage.setItem(

"controleHoras",

JSON.stringify(registros)

)


localStorage.setItem(

"controleHorasBackup",

JSON.stringify(registros)

)


document.getElementById("statusBackup").innerHTML=

"Backup salvo "+new Date().toLocaleTimeString()

}




function carregar(){


let dados=

localStorage.getItem("controleHoras")


let backup=

localStorage.getItem("controleHorasBackup")



if(dados)

registros=JSON.parse(dados)


else if(backup)

registros=JSON.parse(backup)



calcular()

}




function backupAutomatico(){

localStorage.setItem(

"controleHorasBackup",

JSON.stringify(registros)

)


document.getElementById("statusBackup").innerHTML=

"Backup automático "+new Date().toLocaleTimeString()

}




setInterval(calcular,10000)

setInterval(backupAutomatico,20000)



window.onbeforeunload=function(){

salvar()

}



carregar()



</script>

</body>

</html>
